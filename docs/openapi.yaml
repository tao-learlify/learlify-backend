        "200":
          description: Test token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /meetings/identity:
    get:
      tags: [Meetings]
      summary: Get current meeting identity
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Identity object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # ==========================================================================
  # NOTIFICATIONS
  # ==========================================================================
  /notifications:
    post:
      tags: [Notifications]
      summary: Create a notification (Admin)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, message, type]
              properties:
                senderId:
                  type: integer
                  nullable: true
                userId:
                  type: integer
                  example: 42
                message:
                  type: string
                  example: Your evaluation has been reviewed.
                read:
                  type: boolean
                  default: false
                deleted:
                  type: boolean
                  default: false
                type:
                  type: integer
                  description: NotificationType ID
                  example: 2
      responses:
        "200":
          description: Notification created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      response:
                        $ref: '#/components/schemas/Notification'

    delete:
      tags: [Notifications]
      summary: Delete expired notifications (Admin)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Expired notifications removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Expired notifications deleted successfully
                  response:
                    type: integer
                    description: Number of deleted records
                  statusCode:
                    type: integer
                    example: 200

  /notifications/all:
    get:
      tags: [Notifications]
      summary: Get notifications for authenticated user
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
          description: Page number for pagination
        - name: unreads
          in: query
          schema:
            type: boolean
          description: Include unread count
      responses:
        "200":
          description: Notification list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      response:
                        type: object
                        properties:
                          notifications:
                            type: array
                            items:
                              $ref: '#/components/schemas/Notification'
                          unreads:
                            type: integer
                            example: 3

  /notifications/all/read:
    put:
      tags: [Notifications]
      summary: Mark all notifications as read
      security:
        - BearerAuth: []
      responses:
        "201":
          description: All marked as read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /notifications/{id}:
    get:
      tags: [Notifications]
      summary: Get notification by ID (owner only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notification object
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      response:
                        $ref: '#/components/schemas/Notification'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Notifications]
      summary: Update notification (owner only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                read:
                  type: boolean
                deleted:
                  type: boolean
      responses:
        "200":
          description: Notification updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'


  # ==========================================================================
  # PACKAGES
  # ==========================================================================
  /packages:
    get:
      tags: [Packages]
      summary: Get user packages
      security:
        - BearerAuth: []
      parameters:
        - name: active
          in: query
          schema:
            type: boolean
          description: Filter by active status
      responses:
        "200":
          description: Package list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      response:
                        type: array
                        items:
                          $ref: '#/components/schemas/Package'

    post:
      tags: [Packages]
      summary: Purchase a package (Stripe payment)
      security:
        - BearerAuth: []
      parameters:
        - name: planId
          in: query
          required: true
          schema:
            type: integer
          description: Plan to subscribe to
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paymentMethodId]
              properties:
                paymentMethodId:
                  type: string
                  description: Stripe PaymentMethod ID
                  example: pm_1N2345abcdef
                requiresAction:
                  type: boolean
                  default: false
                  description: True when 3DS confirmation is required
                cancel:
                  type: boolean
                  default: false
                  description: Cancel in-progress payment intent
      responses:
        "201":
          description: Package created and payment processed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      response:
                        $ref: '#/components/schemas/Package'
        "402":
          description: Payment required / subscription limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Packages]
      summary: Submit writing or speaking exercise (deducts from package)
      description: |
        Updates progress with the submitted work and, if `needsRevision` is true,
        deducts one credit from the active package and creates an evaluation record.
      security:
        - BearerAuth: []
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [writings, speakings]
        - name: category
          in: query
          required: true
          schema:
            type: string
            example: Writing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [progress]
              properties:
                progress:
                  type: object
                  required: [id, progressUpdated]
                  properties:
                    id:
                      type: integer
                      example: 88
                    progressUpdated:
                      type: object
                      description: Updated progress data to persist
                needsRevision:
                  type: boolean
                  default: false
                  description: Whether to request teacher review
      responses:
        "200":
          description: Progress updated without revision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "201":
          description: Progress updated and evaluation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "402":
          description: No active subscription credits available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /packages/assign:
    post:
      tags: [Packages]
      summary: Assign package to user (Admin)

openapi: 3.0.3

info:
  title: Learlify API
  description: |
    REST API for the Learlify / AptisGo learning platform.

    ## Authentication
    Most endpoints require a **Bearer JWT** token in the `Authorization` header.
    Obtain a token via `POST /auth/login`, `POST /auth/social/google`, or `POST /auth/social/facebook`.

    ## Roles
    | Role    | Description |
    |---------|-------------|
    | `USER`  | Regular student |
    | `TEACHER` | Evaluator / instructor |
    | `ADMIN` | Full platform access |

    ## Response envelope
    All responses follow a consistent envelope:
    ```json
    {
      "message": "Human-readable description",
      "response": {},
      "statusCode": 200
    }
    ```
    Paginated responses include an additional `pagination` object.

    ## Error format
    ```json
    {
      "message": "Error description",
      "statusCode": 400
    }
    ```
  version: 1.0.0
  contact:
    name: Learlify Team

servers:
  - url: https://api.learlify.com/api/v1
    description: Production
  - url: http://localhost:3100/api/v1
    description: Local development

tags:
  - name: Authentication
    description: Registration, login, token management
  - name: Users
    description: User profile management
  - name: Plans
    description: Subscription plans catalog
  - name: Packages
    description: User subscriptions and Stripe payments
  - name: Courses
    description: Course enrollment
  - name: Evaluations
    description: Teacher-reviewed writing and speaking evaluations
  - name: Latest Evaluations
    description: Most recent evaluation snapshots per category
  - name: Exams
    description: Exam definitions and content
  - name: Progress
    description: Per-exam user progress tracking
  - name: Classes
    description: Live tutoring session management
  - name: Schedule
    description: Teacher availability slots
  - name: Meetings
    description: Twilio video-call tokens
  - name: Notifications
    description: In-app notification center
  - name: Access
    description: Plan → resource access control (Admin)
  - name: Admin
    description: Administrative user management
  - name: Stats
    description: Aggregated performance statistics
  - name: Advance
    description: Course progression records
  - name: Categories
    description: Exam categories (Writing, Speaking, Reading, …)
  - name: Models
    description: Exam model types (APTIS, IELTS, …)
  - name: Languages
    description: Supported UI languages
  - name: Gifts
    description: Plan gift creation and redemption
  - name: Feedback
    description: User feedback
  - name: Reports
    description: Quality and issue reports
  - name: Roles
    description: User roles catalog
  - name: AWS
    description: S3 file storage operations
  - name: YouTube
    description: YouTube video resources
  - name: System
    description: Health, metrics, and webhooks

# ---------------------------------------------------------------------------
# Security scheme
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/login

  # -------------------------------------------------------------------------
  # Reusable schemas
  # -------------------------------------------------------------------------
  schemas:

    # ── Envelope wrappers ─────────────────────────────────────────────────
    SuccessResponse:
      type: object
      properties:
        message:
          type: string
          example: Operation completed successfully
        response:
          description: Payload – object or array depending on the endpoint
        statusCode:
          type: integer
          example: 200

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          example: 47
        pages:
          type: integer
          example: 5

    PaginatedResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            pagination:
              $ref: '#/components/schemas/PaginationMeta'

    ErrorResponse:
      type: object
      required: [message, statusCode]
      properties:
        message:
          type: string
          example: Resource not found
        statusCode:
          type: integer
          example: 404

    TokenResponse:
      type: object
      properties:
        message:
          type: string
        response:
          type: object
          properties:
            token:
              type: string
              description: Signed JWT (expires in 30 days)
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        statusCode:
          type: integer
          example: 200

    # ── Domain models ────────────────────────────────────────────────────
    Role:
      type: object
      properties:
        id:
          type: integer
          example: 2
        name:
          type: string
          enum: [ADMIN, TEACHER, USER]
          example: USER

    User:
      type: object
      properties:
        id:
          type: integer
          example: 42
        email:
          type: string
          format: email
          example: john.doe@example.com
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        imageUrl:
          type: string
          format: uri
          nullable: true
          example: https://cdn.example.com/avatar.jpg
        isVerified:
          type: boolean
          example: true
        lang:
          type: string
          example: en
        lastLogin:
          type: string
          format: date
          example: "2026-05-01"
        tour:
          type: string
          description: JSON string of completed onboarding steps
          example: '{"dashboard":true,"exams":false}'
        stripeCustomerId:
          type: string
          nullable: true
          example: cus_Nffrfeq1234
        googleId:
          type: string
          nullable: true
        facebookId:
          type: string
          nullable: true
        roleId:
          type: integer
          example: 2
        modelId:
          type: integer
          nullable: true
          example: 1
        role:
          $ref: '#/components/schemas/Role'

    Plan:
      type: object
      properties:
        id:
          type: integer
          example: 3
        name:
          type: string
          example: GO
        available:
          type: boolean
          example: true
        classes:
          type: integer
          example: 2
        description:
          type: string
          example: Basic plan with 2 classes and writing feedback
        currency:
          type: string
          example: EUR
        writing:
          type: integer
          example: 3
        speaking:
          type: integer
          example: 3
        price:
          type: number
          format: float
          example: 29.99
        feature:
          type: string
          enum: [COURSES, CLASSES, EXAMS]
          example: EXAMS
        modelId:
          type: integer
          example: 1

    Package:
      type: object
      properties:
        id:
          type: integer
          example: 101
        userId:
          type: integer
          example: 42
        planId:
          type: integer
          example: 3
        total:
          type: number
          format: float
          example: 29.99
        isActive:
          type: boolean
          example: true
        expirationDate:
          type: string
          format: date
          example: "2026-11-01"
        stripeChargeId:
          type: string
          nullable: true
          example: ch_1N2345abcdef
        speakings:
          type: integer
          example: 3
        writings:
          type: integer
          example: 3
        classes:
          type: integer
          example: 2
        isNotified:
          type: boolean
          example: false

    Exam:
      type: object
      properties:
        id:
          type: integer
          example: 7
        name:
          type: string
          example: APTIS B2 General
        categoryId:
          type: integer
          example: 2
        modelId:
          type: integer
          example: 1
        type:
          type: string
          example: full

    Category:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          enum: [Writing, Speaking, Reading, Listening, Grammar & Vocabulary]
          example: Writing

    Evaluation:
      type: object
      properties:
        id:
          type: integer
          example: 55
        examId:
          type: integer
          example: 7
        userId:
          type: integer
          example: 42
        teacherId:
          type: integer
          nullable: true
          example: 12
        progressId:
          type: integer
          example: 88
        categoryId:
          type: integer
          example: 1
        data:
          type: object
          description: JSON payload with the student submission (feedback, cloudStorageRef, etc.)
        comments:
          type: array
          items:
            $ref: '#/components/schemas/EvaluationComment'
        status:
          type: string
          enum: [PENDING, TAKEN, EVALUATED]
          example: PENDING
        score:
          type: array
          items: {}
          description: Nested score arrays populated when the evaluation is reviewed

    EvaluationComment:
      type: object
      required: [html, text]
      properties:
        html:
          type: string
          example: "<div>Great structure, but work on cohesion.</div>"
        text:
          type: string
          example: "Great structure, but work on cohesion."

    LatestEvaluation:
      type: object
      properties:
        id:
          type: integer
          example: 201
        userId:
          type: integer
          example: 42
        categoryId:
          type: integer
          example: 2
        data:
          type: object
          description: Latest evaluation snapshot

    Progress:
      type: object
      properties:
        id:
          type: integer
          example: 88
        userId:
          type: integer
          example: 42
        examId:
          type: integer
          example: 7
        currentScore:
          type: number
          example: 72.5
        data:
          type: object
          description: Full progress map keyed by category name
          example:
            uuid: "a1b2-c3d4"
            Writing:
              feedback: []
              lastIndex: 2
            Speaking:
              cloudStorageRef: []
              lastIndex: 0
            Reading:
              score: 15
              lastIndex: 5
              feedback: []
              points: 30

    Class:
      type: object
      properties:
        id:
          type: integer
          example: 30
        userId:
          type: integer
          example: 42
        classType:
          type: string
          example: speaking
        startTime:
          type: string
          format: date-time
          example: "2026-05-10T10:00:00Z"
        endTime:
          type: string
          format: date-time
          example: "2026-05-10T11:00:00Z"
        status:
          type: string
          enum: [pending, confirmed, completed, cancelled]
          example: confirmed

    Schedule:
      type: object
      properties:
        id:
          type: integer
          example: 15
        userId:
          type: integer
          example: 12
        startDate:
          type: string
          format: date-time
          example: "2026-05-10T09:00:00Z"
        endDate:
          type: string
          format: date-time
          example: "2026-05-10T18:00:00Z"
        createdAt:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        id:
          type: integer
          example: 500
        senderId:
          type: integer
          nullable: true
          example: 1
        userId:
          type: integer
          example: 42
        message:
          type: string
          example: "Your evaluation has been reviewed."
        read:
          type: boolean
          example: false
        deleted:
          type: boolean
          example: false
        type:
          type: integer
          description: NotificationType id
          example: 2

    Access:
      type: object
      properties:
        id:
          type: integer
          example: 8
        planId:
          type: integer
          example: 3
        courseId:
          type: integer
          nullable: true
          example: 1
        classId:
          type: integer
          nullable: true
        examId:
          type: integer
          nullable: true
          example: 7

    Language:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: English
        code:
          type: string
          example: en

    Course:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: APTIS B1
        description:
          type: string
          example: Complete preparation course for APTIS B1 level

    Advance:
      type: object
      properties:
        id:
          type: integer
          example: 11
        userId:
          type: integer
          example: 42
        courseId:
          type: integer
          example: 1
        currentLevel:
          type: string
          example: unit_3
        progress:
          type: number
          format: float
          example: 45.0

    Gift:
      type: object
      properties:
        id:
          type: integer
          example: 9
        planId:
          type: integer
          example: 3
        gifter:
          type: integer
          example: 42
        receiver:
          type: integer
          nullable: true

    Stats:
      type: object
      properties:
        id:
          type: integer
          example: 300
        userId:
          type: integer
          example: 42
        evaluationId:
          type: integer
          nullable: true
        examId:
          type: integer
          example: 7
        data:
          type: object
          description: Computed score breakdown

    ExamModel:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          enum: [APTIS, IELTS]
          example: APTIS
        data:
          type: object

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  # ==========================================================================
  # AUTH
  # ==========================================================================
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      description: Creates a user account and sends an email verification link.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, firstName, lastName, password]
              properties:
                email:
                  type: string
                  format: email
                  example: jane.doe@example.com
                firstName:
                  type: string
                  minLength: 2
                  maxLength: 50
                  example: Jane
                lastName:
                  type: string
                  minLength: 2
                  maxLength: 50
                  example: Doe
                password:
                  type: string
                  format: password
                  minLength: 6
                  maxLength: 50
                  example: "S3cur3P@ss!"
      responses:
        "201":
          description: Account created – returns a JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              example:
                message: Register completed
                response:
                  token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                statusCode: 201
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: User already exists
                statusCode: 409

  /auth/login:
    post:
      tags: [Authentication]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: jane.doe@example.com
                password:
                  type: string
                  format: password
                  example: "S3cur3P@ss!"
      responses:
        "200":
          description: Authenticated – returns JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        "400":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/social/google:
    post:
      tags: [Authentication]
      summary: Sign in / sign up with Google
      description: Creates or updates the user account using the Google token payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, googleId, givenName]
              properties:
                email:
                  type: string
                  format: email
                  example: jane@gmail.com
                googleId:
                  type: string
                  example: "108204925612345678901"
                givenName:
                  type: string
                  example: Jane
                familyName:
                  type: string
                  example: Doe
                imageUrl:
                  type: string
                  format: uri
                  example: https://lh3.googleusercontent.com/photo.jpg
      responses:
        "200":
          description: Existing user logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        "201":
          description: New user created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /auth/social/facebook:
    post:
      tags: [Authentication]
      summary: Sign in / sign up with Facebook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, facebookId, givenName]
              properties:
                email:
                  type: string
                  format: email
                  example: jane@facebook.com
                facebookId:
                  type: string
                  example: "1234567890123456"
                givenName:
                  type: string
                  example: Jane
                familyName:
                  type: string
                  example: Doe
                imageUrl:
                  type: string
                  format: uri
      responses:
        "200":
          description: Existing user logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        "201":
          description: New user created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /auth/verify:
    put:
      tags: [Authentication]
      summary: Verify email address
      parameters:
        - name: code
          in: query
          required: true
          description: JWT-encoded verification code sent by email
          schema:
            type: string
      responses:
        "201":
          description: Account verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        "400":
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/forgot:
    post:
      tags: [Authentication]
      summary: Request password reset email
      description: Always returns 200 to prevent email enumeration.
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
      responses:
        "200":
          description: Reset email sent (or silently ignored if not found)
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: object
                    properties:
                      details:
                        type: object
                        properties:
                          to:
                            type: string
                          date:
                            type: string
                      sended:
                        type: boolean
                        example: true
                  statusCode:
                    type: integer
                    example: 200

  /auth/refresh-token:
    post:
      tags: [Authentication]
      summary: Refresh JWT token
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: Current (possibly near-expiry) JWT
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        "200":
          description: New token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        "403":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/reset:
    put:
      tags: [Authentication]
      summary: Reset password using email code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, password]
              properties:
                code:
                  type: string
                  format: jwt
                  description: Reset code from the password-reset email
                password:
                  type: string
                  format: password
                  minLength: 6
                  example: "N3wP@ssword!"
      responses:
        "201":
          description: Password updated, new token returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        "400":
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/demo:
    get:
      tags: [Authentication]
      summary: Get demo user token
      description: Returns a JWT for the pre-configured demo account (read-only).
      responses:
        "200":
          description: Demo token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Logout (invalidate token)
      description: Adds the current token to a Redis blocklist.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out successfully
                  statusCode:
                    type: integer
                    example: 200

  # ==========================================================================
  # USERS
  # ==========================================================================
  /users:
    get:
      tags: [Users]
      summary: List users (paginated)
      security:
        - BearerAuth: []
      parameters:
        - name: role
          in: query
          required: true
          description: Filter by role name
          schema:
            type: string
            enum: [ADMIN, TEACHER, USER]
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      response:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
        "404":
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Users]
      summary: Update authenticated user profile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                  example: Jane
                lastName:
                  type: string
                  example: Smith
                imageUrl:
                  type: string
                  format: uri
                lang:
                  type: string
                  example: es
                password:
                  type: string
                  format: password
                  description: New password (requires currentPassword)
                currentPassword:
                  type: string
                  format: password
                  description: Required when changing password
      responses:
        "200":
          description: Updated – new JWT returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        "400":
          description: Current password missing or wrong
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 42
      responses:
        "200":
          description: User object
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      response:
                        $ref: '#/components/schemas/User'
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/tour:
    put:
      tags: [Users]
      summary: Mark a tour step as completed
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [draft]
              properties:
                draft:
                  type: string
                  description: Tour step key (e.g. "dashboard", "exams")
                  example: dashboard
      responses:
        "200":
          description: Tour step recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: object
                    properties:
                      completed:
                        type: boolean
                        example: true
                  statusCode:
                    type: integer
                    example: 200

  # ==========================================================================
  # PLANS
  # ==========================================================================
  /plans/catalog:
    get:
      tags: [Plans]
      summary: Get plan catalog (public)
      parameters:
        - name: modelId
          in: query
          schema:
            type: integer
          description: Filter by exam model ID
      responses:
        "200":
          description: List of plans
          content:

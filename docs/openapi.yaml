        "200":
          description: Role list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      response:
                        type: array
                        items:
                          $ref: '#/components/schemas/Role'

  # ==========================================================================
  # AWS / STORAGE
  # ==========================================================================
  /aws:
    get:
      tags: [AWS]
      summary: Get file from S3 via CloudFront
      security:
        - BearerAuth: []
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
          description: S3 object key
      responses:
        "200":
          description: File content or signed URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /aws/upload:
    post:
      tags: [AWS]
      summary: Upload speaking audio to S3
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Audio files (max 5 files, 5 MB each)
      responses:
        "201":
          description: Files uploaded, CloudFront URLs returned
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      response:
                        type: array
                        items:
                          type: object
                          properties:
                            url:
                              type: string
                              format: uri
                            key:
                              type: string

  # ==========================================================================
  # YOUTUBE
  # ==========================================================================
  /youtube:
    get:
      tags: [YouTube]
      summary: Get YouTube video resources
      security:
        - BearerAuth: []
      parameters:
        - name: model
          in: query
          schema:
            type: string
            enum: [APTIS, IELTS]
      responses:
        "200":
          description: Video list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # ==========================================================================
  # SYSTEM
  # ==========================================================================
  /system:
    get:
      tags: [System]
      summary: Lightweight ping / health check
      responses:
        "200":
          description: Server timestamp
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time

  /health:
    get:
      tags: [System]
      summary: Detailed health check (DB + Redis)
      responses:
        "200":
          description: All services healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  db:
                    type: string
                    example: connected
                  redis:
                    type: string
                    example: connected
                  timestamp:
                    type: string
                    format: date-time
        "503":
          description: One or more dependencies unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /metrics:
    get:
      tags: [System]
      summary: Prometheus metrics (Admin)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Prometheus text exposition format
          content:
            text/plain:
              schema:
                type: string

  /webhooks/stripe:
    post:
      tags: [System]
      summary: Stripe webhook receiver
      description: |
        Receives Stripe events. Signature is verified against `STRIPE_WEBHOOK_SECRET`.
        Handled events: `payment_intent.succeeded`, `payment_intent.payment_failed`, `customer.subscription.deleted`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw Stripe event object
      responses:
        "200":
          description: Event acknowledged
        "400":
          description: Invalid signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

security:
  - BearerAuth: []

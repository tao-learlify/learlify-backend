  # ==========================================================================
  /report:
    post:
      tags: [Reports]
      summary: Submit a report
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  example: Found a bug in the reading section.
                context:
                  type: object
      responses:
        "201":
          description: Report submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /report/quality:
    post:
      tags: [Reports]
      summary: Submit a quality report
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                  example: 4
                comment:
                  type: string
      responses:
        "201":
          description: Quality report submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'


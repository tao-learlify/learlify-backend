  # ==========================================================================
  # EVALUATIONS
  # ==========================================================================
  /evaluations/all:
    get:
      tags: [Evaluations]
      summary: List evaluations (role-aware)
      description: |
        - **USER**: own evaluations for a given model, paginated (4 per page)
        - **TEACHER** with `?own`: evaluations assigned to them, paginated (10/page)
        - **ADMIN**: all evaluations with optional user filter
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: model
          in: query
          schema:
            type: string
            enum: [APTIS, IELTS]
          description: Required for USER role
        - name: own
          in: query
          schema:
            type: boolean
          description: TEACHER filter – only own evaluations
        - name: user
          in: query
          schema:
            type: integer
          description: ADMIN / TEACHER filter – evaluations for specific user
        - name: count
          in: query
          schema:
            type: boolean
          description: Return evaluation counts by category (TEACHER/ADMIN)
      responses:
        "200":
          description: Paginated evaluation list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      response:
                        type: array
                        items:
                          $ref: '#/components/schemas/Evaluation'

  /evaluations/{id}:
    get:
      tags: [Evaluations]
      summary: Get evaluation by ID
      description: Returns full evaluation with exam exercises and cloud storage URLs. Accessible by owner, assigned teacher, or admin.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 55
      responses:
        "200":
          description: Evaluation with exercises
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      response:
                        $ref: '#/components/schemas/Evaluation'
        "404":
          description: Evaluation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Evaluations]
      summary: Review evaluation (Teacher/Admin)
      description: |
        - Without `score`: updates status (e.g. `TAKEN` to claim, `PENDING` to release).
        - With `score + status=EVALUATED`: persists teacher scores and generates stats.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [PENDING, TAKEN, EVALUATED]
                  example: EVALUATED
                score:
                  type: array
                  description: Nested score arrays matching the evaluation structure
                  items: {}
                comments:
                  type: array
                  description: Per-exercise teacher comments
                  items:
                    $ref: '#/components/schemas/EvaluationComment'
      responses:
        "200":
          description: Evaluation reviewed and stats saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "201":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "400":
          description: Invalid comment format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Evaluation already completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      tags: [Evaluations]
      summary: Reopen a completed evaluation (Teacher/Admin)
      description: Moves status from EVALUATED back to TAKEN.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Status reset to TAKEN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "404":
          description: Evaluation not found or not in EVALUATED status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

